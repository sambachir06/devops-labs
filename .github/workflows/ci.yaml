name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  validate-build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Validate YAML syntax
        run: |
          echo "Validating YAML..."
          yamllint -d '{
            extends: default,
            rules: {
              document-start: disable,
              line-length: disable,
              truthy: disable,
              new-line-at-end-of-file: disable
            }
          }' .

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/my-nginx-app:latest \
                       -t ghcr.io/${{ github.repository_owner }}/my-nginx-app:${IMAGE_TAG} \
                       docker-labs/my-nginx-app

      - name: Run container
        run: |
          docker run -d -p 8080:80 --name test-container ghcr.io/${{ github.repository_owner }}/my-nginx-app:${IMAGE_TAG}
          sleep 5

      - name: Test application
        run: |
          curl http://localhost:8080 | grep "Hello from CI-built Docker image"

      - name: Push images to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/my-nginx-app:latest
          docker push ghcr.io/${{ github.repository_owner }}/my-nginx-app:${IMAGE_TAG}