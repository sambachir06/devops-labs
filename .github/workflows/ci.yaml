name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Validate YAML syntax
        run: |
          echo "Validating YAML..."
          yamllint -d '{
            extends: default,
            rules: {
              document-start: disable,
              line-length: disable,
              truthy: disable,
              new-line-at-end-of-file: disable
            }
          }' .

      - name: Build Docker image
        run: |
          docker build -t my-nginx-app docker-labs/my-nginx-app

      - name: Run container
        run: |
          docker run -d -p 8080:80 --name test-container my-nginx-app
          sleep 5

      - name: Test application
        run: |
          curl http://localhost:8080 | grep "Hello from CI-built Docker image"